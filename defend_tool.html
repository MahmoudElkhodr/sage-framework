function SAGEDefendDashboard() {
  const hashTab = window.location.hash.replace('#','');
  const validTabs = ['recommender','typology','matching','principles','cases','plan'];
  const [showWelcome, setShowWelcome] = useState(validTabs.includes(hashTab) ? false : true);

  const [typologyFilter, setTypologyFilter] = useState("All");

    </style></head><body>`);

    // Context summary
    w.document.write(`<div class="meta">`);
    [["Unit", pv.unit], ["Level", pv.level], ["Cohort", pv.cohort], ["Delivery", pv.delivery], ["Discipline", pv.discipline], ["Assessment Task", assess === "Other" ? "Other: " + (pv.assessment_other || "") : assess], ["Defend Format", fmt], ["Weighting", pv.weight], ["Challenge Approach", ques], ["Online Controls", onlineCtrl || "N/A"]].forEach(([l, v]) => {

    }
    // Question approach warning
    if (fmt && ques && fmtMap) {

        w.document.write(`<div class="red-warning">🔴 <strong>Evidence-based concern (Principle 3):</strong> ${fmtMap.incompatible[incompKey]}</div>`);

    }

    // ── STEP 1: What you are verifying ──
    w.document.write(`<h2>Step 1: What You Are Verifying and Why</h2>`);
    if (assess && mapping) {
      w.document.write(`<div class="step"><div class="step-body">Your assessment task (<strong>${assess}</strong>) requires the cognitive operation "<strong>${mapping.operation}</strong>." The Defend checkpoint verifies that each student can perform this operation individually — not just that they submitted work containing it.<br/><br/>${mapping.why}</div></div>`);

    if (fmt && typEntry) {

    }
    if (timing) {

      w.document.write(`<div class="timing-item"><span class="timing-label">Time per student</span>${timing.perStudent}</div>`);
      w.document.write(`<div class="timing-item"><span class="timing-label">Sessions per day</span>${timing.sessionsPerDay}</div>`);
      w.document.write(`<div class="timing-item"><span class="timing-label">Preparation time</span>${timing.prepTime}</div>`);

    }
    if (rubric) {
      w.document.write(`<h3>Suggested Assessment Rubric</h3>`);
      w.document.write(`<p style="font-size:11px;color:#64748b;margin-bottom:6px">Adapt the descriptors below to your unit's learning outcomes. The three levels indicate strength of evidence that the student owns the reasoning in their submission.</p>`);
      w.document.write(`<table><tr><th style="width:18%">Criterion</th><th style="width:28%">Demonstrates Ownership</th><th style="width:28%">Partial Ownership</th><th style="width:26%">Insufficient Evidence</th></tr>`);

      });
      w.document.write(`</table>`);
    }

    // ── STEP 3: Challenge design + sample prompts ──
    w.document.write(`<h2>Step 3: Challenge Design</h2>`);
    if (ques && ques !== "Not yet decided") {
      w.document.write(`<div class="step"><div class="step-body"><strong>Approach:</strong> ${ques}<br/><br/>Design Principle 3 requires that challenge questions are created in advance, mapped to the unit's learning outcomes, and applied consistently across all students. ${ques.includes("Unseen") ? "Prepare 2–3 task variants to prevent answer-sharing. Verify each variant has a confirmed solution before the session." : ques.includes("Randomised") ? "Build a pool of at least 3× the number of questions each student will receive. Randomise at the session level, not the question level." : "Ensure coverage of each learning outcome in your question bank. Every student should face comparable challenge regardless of which examiner they see."}</div></div>`);
    }
    if (challenges) {
      w.document.write(`<h3>Sample Challenge Prompts for "${assess}"</h3>`);
      w.document.write(`<p style="font-size:11px;color:#64748b;margin-bottom:6px">Adapt these prompts to your unit content. Replace placeholders in [brackets] with specific references from each student's submission. The final prompt in each set targets the SAGE process specifically.</p>`);

    if (constraints.length > 0) {

    w.document.write(`</body></html>`);
    w.document.close();
    w.print();
  };

  const tabs = [
    { id: "recommender", label: "Format Recommender", icon: "🎯" },
    { id: "framework", label: "SAGE Cycle", icon: "⟳" },

    { id: "cases", label: "Evidence Base", icon: "◧" },

  return (
    <div style={{ fontFamily: "'Instrument Sans', 'Segoe UI', 'Helvetica Neue', system-ui, sans-serif", background: "#f8f6f1", minHeight: "100vh", color: "#1a1a1a" }}>

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "12px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "14px" }}>
              <div style={{ width: "42px", height: "42px", borderRadius: "10px", background: "linear-gradient(135deg, #40916c, #d4a03c)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "20px", color: "white", fontWeight: 800 }}>S</div>
              <div>
                <h1 style={{ color: "white", fontSize: "20px", fontWeight: 700, margin: 0 }}>Structured AI-Guided Education</h1>

      {/* WELCOME PANEL */}
      {showWelcome && (
        <div style={{ maxWidth: "1200px", margin: "0 auto", padding: "32px 16px 40px" }}>

            <h2 style={{ fontSize: "24px", fontWeight: 800, color: "white", margin: "0 0 6px 0", lineHeight: 1.35 }}>Your students are using AI.<br/>You cannot tell who did the thinking. You need assurance.</h2>

                <h3 style={{ fontSize: "16px", fontWeight: 700, color: "#1b4332", margin: "0 0 10px 0" }}>Why SAGE?</h3>

                </p>
                <p style={{ fontSize: "13px", color: "#4a4a4a", lineHeight: 1.6, margin: 0 }}>
                  The <strong>Structured AI-Guided Education (SAGE)</strong> framework is a validated pedagogy that treats generative AI as a professional tool whose outputs must be critically evaluated, refined with evidence-based reasoning, and defended under supervision.
                </p>
              </div>

              <div style={{ background: "white", border: "1px solid #ddd", borderRadius: "14px", padding: "22px" }}>

              <SectionHeader accent="#c44d3f" subtitle="The SAGE framework has been implemented across eight empirical studies involving over 800 students at multiple Australian campuses. Three implementations reported in the accompanying JUTLP paper are presented in detail below, with the remaining five summarised.">Evidence Base: Eight Empirical Implementations</SectionHeader>

              {/* Detailed case studies */}
              <h3 style={{ fontSize: "14px", fontWeight: 700, color: "#475569", margin: "0 0 12px 0", textTransform: "uppercase", letterSpacing: "0.03em" }}>Detailed Case Studies (This Paper)</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: "16px", marginBottom: "28px" }}>
                {CASE_STUDIES.map((cs, i) => (

                      <div><h3 style={{ fontSize: "15px", fontWeight: 700, color: "#0f172a", margin: 0 }}>{cs.unit}</h3><p style={{ fontSize: "11px", color: "#94a3b8", margin: "2px 0 0 0" }}>{cs.level}</p></div>
                      <div style={{ background: cs.color + "14", border: "1px solid " + cs.color + "33", borderRadius: "8px", padding: "6px 12px" }}>
                        <p style={{ fontSize: "10px", fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", margin: "0 0 2px 0" }}>Defend Task Used</p>
                        <p style={{ fontSize: "13px", fontWeight: 700, color: cs.color, margin: 0 }}>{cs.defendTask}</p>
                      </div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr" }}>
                      <div style={{ padding: "16px 20px", borderRight: "1px solid #f1f5f9" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "6px", marginBottom: "8px" }}><span style={{ fontSize: "14px" }}>✓</span><span style={{ fontSize: "12px", fontWeight: 700, color: "#16a34a", textTransform: "uppercase" }}>What worked</span></div>
                        <p style={{ fontSize: "12px", color: "#475569", lineHeight: 1.55, margin: 0 }}>{cs.positives}</p>
                      </div>
                      <div style={{ padding: "16px 20px", background: "#fffbeb" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "6px", marginBottom: "8px" }}><span style={{ fontSize: "14px" }}>⚠️</span><span style={{ fontSize: "12px", fontWeight: 700, color: "#92400e", textTransform: "uppercase" }}>Challenges encountered</span></div>
                        <p style={{ fontSize: "12px", color: "#78350f", lineHeight: 1.55, margin: 0 }}>{cs.constraints}</p>
                      </div>
                    </div>
                    <div style={{ padding: "12px 20px", background: "#f8fafc", borderTop: "1px solid #f1f5f9" }}>
                      <p style={{ fontSize: "12px", color: "#475569", margin: 0 }}><span style={{ fontWeight: 700, color: "#0f172a" }}>Key lesson:</span> {cs.keyLesson}</p>
                    </div>
                  </div>
                ))}
              </div>

              {/* Additional implementations */}
              <h3 style={{ fontSize: "14px", fontWeight: 700, color: "#475569", margin: "0 0 12px 0", textTransform: "uppercase", letterSpacing: "0.03em" }}>Additional Implementations</h3>
              <div style={{ background: "white", border: "1px solid #e2e8f0", borderRadius: "12px", overflow: "hidden", marginBottom: "24px" }}>
                {ADDITIONAL_IMPLEMENTATIONS.map((impl, i) => (
                  <div key={i} style={{ padding: "12px 20px", borderBottom: i < ADDITIONAL_IMPLEMENTATIONS.length - 1 ? "1px solid #f1f5f9" : "none", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "8px" }}>
                    <div>
                      <p style={{ fontSize: "13px", fontWeight: 600, color: "#0f172a", margin: 0 }}>{impl.unit}</p>
                      <p style={{ fontSize: "11px", color: "#94a3b8", margin: "2px 0 0 0" }}>{impl.level} · {impl.campuses}</p>
                    </div>
                    <div style={{ display: "flex", gap: "6px" }}>
                      <Badge label={impl.discipline} colors={{ bg: "#f1f5f9", text: "#475569" }} />
                      <Badge label={impl.reference} colors={{ bg: "#eff6ff", text: "#1e40af" }} />
                    </div>
                  </div>
                ))}
              </div>

              {/* Synthesis */}
              <div style={{ background: "#f0f9ff", border: "1px solid #bae6fd", borderRadius: "12px", padding: "20px", marginBottom: "16px" }}>
                <h4 style={{ fontSize: "14px", fontWeight: 700, color: "#0c4a6e", margin: "0 0 8px 0" }}>Synthesis</h4>
                <p style={{ fontSize: "13px", color: "#0e7490", lineHeight: 1.6, margin: 0 }}>The assurance value of a Defend checkpoint increases with three factors: the degree to which individual reasoning is separated from group output, the deliberateness of the challenge design, and whether participation is mandatory rather than voluntary. Process documentation alone does not close the verification gap — it must be paired with a live demonstration of reasoning ownership.</p>
              </div>

              {/* Sector signal */}
              <div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: "12px", padding: "16px 20px" }}>
                <p style={{ fontSize: "12px", color: "#64748b", margin: 0, lineHeight: 1.5 }}>The SAGE framework has been referenced by the University of Warwick and the National University of Singapore. Three CQUniversity SAGE resources are listed on the TEQSA Generative AI Knowledge Hub under Academic Integrity and Assessment Reform and Student Resources and Support.</p>
              </div>
            </div>
          )}

          {/* ════ GETTING STARTED ════ */}
          {activeTab === "plan" && (
            <div>
              <SectionHeader accent="#2d6a4f" subtitle="Design your Defend checkpoint step by step. The template is interlinked — your assessment task selection drives the recommended Defend format, and your format selection drives compatible challenge approaches. Soft warnings appear if your selections create a weaker design. Print the completed template as a contextual implementation brief.">Defend Planner</SectionHeader>

              <div ref={printRef} style={{ background: "white", border: "1px solid #e2e8f0", borderRadius: "14px", padding: "24px", marginBottom: "20px" }}>

                {/* Section 1: Context */}
                <h3 style={{ fontSize: "15px", fontWeight: 700, color: "#0f172a", margin: "0 0 16px 0" }}>1. Your Teaching Context</h3>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: "14px", marginBottom: "24px" }}>
                  {PLANNING_FIELDS_CONTEXT.map(f => (
                    <div key={f.id}>
                      <label style={labelStyle}>{f.label}</label>
                      {f.type === "select" ? (
                        <select value={planValues[f.id] || ""} onChange={e => setPlanValues(prev => ({ ...prev, [f.id]: e.target.value }))} onClick={e => e.stopPropagation()} style={selectStyle}>
                          <option value="">— Select —</option>
                          {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                      ) : (
                        <input type="text" placeholder={f.placeholder} value={planValues[f.id] || ""} onChange={e => setPlanValues(prev => ({ ...prev, [f.id]: e.target.value }))} onClick={e => e.stopPropagation()} style={inputStyle} />
                      )}
                    </div>
                  ))}
                </div>

                {/* Section 2: Assessment → Format → Questions cascade */}
                <h3 style={{ fontSize: "15px", fontWeight: 700, color: "#0f172a", margin: "0 0 16px 0" }}>2. Assessment, Format, and Challenge Design</h3>

                {/* Assessment task */}
                <div style={{ marginBottom: "14px" }}>
                  <label style={labelStyle}>Assessment Task Being Verified</label>
                  <select value={planValues.assessment || ""} onChange={e => {
                    const val = e.target.value;
                    const mapping = ASSESSMENT_FORMAT_MAP[val];
                    setPlanValues(prev => ({
                      ...prev,
                      assessment: val,
                      assessment_other: val === "Other" ? (prev.assessment_other || "") : "",
                      format: mapping ? mapping.recommended : prev.format || "",
                      questions: mapping && FORMAT_QUESTION_MAP[mapping.recommended] ? FORMAT_QUESTION_MAP[mapping.recommended].recommended : prev.questions || "",
                    }));
                  }} onClick={e => e.stopPropagation()} style={selectStyle}>
                    <option value="">— Select —</option>
                    {ASSESSMENT_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                  {planValues.assessment === "Other" && (
                    <input type="text" placeholder="Please specify your assessment type" value={planValues.assessment_other || ""} onChange={e => setPlanValues(prev => ({ ...prev, assessment_other: e.target.value }))} onClick={e => e.stopPropagation()} style={{ ...inputStyle, marginTop: "6px" }} />
                  )}
                </div>

                {/* Recommendation advisory from assessment */}
                {planValues.assessment && ASSESSMENT_FORMAT_MAP[planValues.assessment] && (
                  <div style={{ background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: "10px", padding: "14px 18px", marginBottom: "14px" }}>
                    <p style={{ fontSize: "12px", color: "#166534", margin: 0, lineHeight: 1.55 }}>
                      <strong>Recommended format for "{planValues.assessment}":</strong> {ASSESSMENT_FORMAT_MAP[planValues.assessment].recommended}
                      <br/><span style={{ color: "#15803d" }}>Cognitive operation: <em>{ASSESSMENT_FORMAT_MAP[planValues.assessment].operation}</em>. {ASSESSMENT_FORMAT_MAP[planValues.assessment].why}</span>
                    </p>
                  </div>
                )}

                {/* Defend format — sorted with recommended first */}
                <div style={{ marginBottom: "14px" }}>
                  <label style={labelStyle}>Chosen Defend Format</label>
                  {(() => {
                    const mapping = ASSESSMENT_FORMAT_MAP[planValues.assessment];
                    const rec = mapping ? mapping.recommended : null;
                    const alts = mapping ? mapping.alternates : [];
                    // Sort: recommended first, then alternates, then rest
                    const sorted = [...ALL_FORMAT_OPTIONS].sort((a, b) => {
                      if (a === rec) return -1; if (b === rec) return 1;
                      const aAlt = alts.includes(a); const bAlt = alts.includes(b);
                      if (aAlt && !bAlt) return -1; if (!aAlt && bAlt) return 1;
                      return 0;
                    });
                    return (
                      <select value={planValues.format || ""} onChange={e => {
                        const val = e.target.value;
                        const fmtMap = FORMAT_QUESTION_MAP[val];
                        setPlanValues(prev => ({
                          ...prev,
                          format: val,
                          questions: fmtMap ? fmtMap.recommended : prev.questions || "",
                        }));
                      }} onClick={e => e.stopPropagation()} style={selectStyle}>
                        <option value="">— Select —</option>
                        {sorted.map(o => {
                          const isRec = o === rec;
                          const isAlt = alts.includes(o);
                          const label = isRec ? "★ " + o + " (recommended)" : isAlt ? "○ " + o + " (alternative)" : o;
                          return <option key={o} value={o}>{label}</option>;
                        })}
                      </select>
                    );
                  })()}
                </div>

                {/* Format mismatch warning */}
                {planValues.assessment && planValues.format && ASSESSMENT_FORMAT_MAP[planValues.assessment] && (() => {
                  const mapping = ASSESSMENT_FORMAT_MAP[planValues.assessment];
                  if (planValues.format !== mapping.recommended && !mapping.alternates.includes(planValues.format)) {
                    return (
                      <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: "10px", padding: "12px 18px", marginBottom: "14px", display: "flex", gap: "8px", alignItems: "flex-start" }}>
                        <span style={{ fontSize: "14px", flexShrink: 0 }}>⚠️</span>
                        <p style={{ fontSize: "12px", color: "#92400e", margin: 0, lineHeight: 1.55 }}>
                          <strong>Alignment concern (Principle 2):</strong> For "{planValues.assessment}", the recommended format is "{mapping.recommended}" (cognitive operation: {mapping.operation}). Your selection of "{planValues.format}" may not target the same cognitive operation. This does not prevent you from proceeding, but the assurance evidence may be weaker. Consider whether the format you have chosen will genuinely test whether the student can {mapping.operation.toLowerCase()}.
                        </p>
                      </div>
                    );
                  }
                  return null;
                })()}

                {/* Challenge question approach — sorted with compatible first */}
                <div style={{ marginBottom: "14px" }}>
                  <label style={labelStyle}>Challenge Question Approach</label>
                  {(() => {
                    const fmtMap = FORMAT_QUESTION_MAP[planValues.format];
                    const rec = fmtMap ? fmtMap.recommended : null;
                    const compat = fmtMap ? fmtMap.compatible : ALL_QUESTION_OPTIONS;
                    const sorted = [...ALL_QUESTION_OPTIONS].sort((a, b) => {
                      if (a === rec) return -1; if (b === rec) return 1;
                      const aC = compat.includes(a); const bC = compat.includes(b);
                      if (aC && !bC) return -1; if (!aC && bC) return 1;
                      return 0;
                    });
                    return (
                      <select value={planValues.questions || ""} onChange={e => setPlanValues(prev => ({ ...prev, questions: e.target.value }))} onClick={e => e.stopPropagation()} style={selectStyle}>
                        <option value="">— Select —</option>
                        {sorted.map(o => {
                          const isRec = o === rec;
                          const isCompat = compat.includes(o);
                          const isIncompat = fmtMap && Object.keys(fmtMap.incompatible).some(k => o.startsWith(k));
                          const label = isRec ? "★ " + o + " (recommended)" : isCompat ? "○ " + o : isIncompat ? "⚠ " + o : o;
                          return <option key={o} value={o}>{label}</option>;
                        })}
                      </select>
                    );
                  })()}
                </div>

                {/* Question approach warning */}
                {planValues.format && planValues.questions && FORMAT_QUESTION_MAP[planValues.format] && (() => {
                  const fmtMap = FORMAT_QUESTION_MAP[planValues.format];
                  const incompKey = Object.keys(fmtMap.incompatible).find(k => planValues.questions.startsWith(k));
                  if (incompKey) {
                    return (
                      <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: "10px", padding: "12px 18px", marginBottom: "14px", display: "flex", gap: "8px", alignItems: "flex-start" }}>
                        <span style={{ fontSize: "14px", flexShrink: 0 }}>🔴</span>
                        <p style={{ fontSize: "12px", color: "#991b1b", margin: 0, lineHeight: 1.55 }}>
                          <strong>Evidence-based concern (Principle 3):</strong> {fmtMap.incompatible[incompKey]}
                        </p>
                      </div>
                    );
                  }
                  return null;
                })()}

                {/* Section 3: Weighting and controls */}
                <h3 style={{ fontSize: "15px", fontWeight: 700, color: "#0f172a", margin: "8px 0 16px 0" }}>3. Weighting and Controls</h3>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: "14px", marginBottom: "14px" }}>
                  <div>
                    <label style={labelStyle}>Defend Weighting</label>
                    <select value={planValues.weight || ""} onChange={e => setPlanValues(prev => ({ ...prev, weight: e.target.value }))} onClick={e => e.stopPropagation()} style={selectStyle}>
                      <option value="">— Select —</option>
                      {WEIGHT_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  </div>
                </div>
                {planValues.weight === "5–10% of total assessment" && (
                  <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: "10px", padding: "12px 18px", marginBottom: "14px", display: "flex", gap: "8px", alignItems: "flex-start" }}>
                    <span style={{ fontSize: "14px", flexShrink: 0 }}>⚠️</span>
                    <p style={{ fontSize: "12px", color: "#92400e", margin: 0, lineHeight: 1.55 }}>
                      <strong>Weighting concern (Principle 5):</strong> In Case Study 2, a 10% individual oral within a 40% group task improved separation but did not fully incentivise deep preparation. Consider whether this weighting is sufficient for your context, or whether a higher weighting or gatekeeping model would provide stronger assurance.
                    </p>
                  </div>
                )}

                {/* Online controls */}
                <div style={{ marginBottom: "14px" }}>
                  <label style={labelStyle}>Online Controls (if applicable)</label>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "6px", marginTop: "4px" }}>
                    {ONLINE_CONTROL_OPTIONS.map(o => {
                      const selected = (planValues.online || []).includes(o);
                      return (
                        <button key={o} type="button" onClick={e => {
                          e.stopPropagation();
                          setPlanValues(prev => {
                            const current = prev.online || [];
                            if (o === "Not applicable (in-person only)") return { ...prev, online: selected ? [] : [o] };
                            const filtered = current.filter(x => x !== "Not applicable (in-person only)");
                            return { ...prev, online: selected ? filtered.filter(x => x !== o) : [...filtered, o] };
                          });
                        }} style={{
                          padding: "5px 12px", borderRadius: "7px", fontSize: "12px", fontWeight: 500,
                          background: selected ? "#dbeafe" : "#f8fafc", color: selected ? "#1e40af" : "#64748b",
                          border: "1px solid " + (selected ? "#93c5fd" : "#e2e8f0"), cursor: "pointer",
                        }}>{selected ? "✓ " : ""}{o}</button>
                      );
                    })}
                  </div>
                </div>

                {(planValues.delivery === "Online" || planValues.delivery === "Hybrid") && !(planValues.online || []).some(x => x !== "Not applicable (in-person only)" && x) && (
                  <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: "10px", padding: "12px 18px", marginBottom: "14px", display: "flex", gap: "8px", alignItems: "flex-start" }}>
                    <span style={{ fontSize: "14px", flexShrink: 0 }}>⚠️</span>
                    <p style={{ fontSize: "12px", color: "#92400e", margin: 0, lineHeight: 1.55 }}>
                      <strong>Security concern (Principle 4):</strong> You have selected {planValues.delivery} delivery but no online controls. Online and hybrid delivery requires layered controls — identity verification, session recording, and randomised questioning at minimum.
                    </p>
                  </div>
                )}

                {/* Notes */}
                <div style={{ marginBottom: "14px" }}>
                  <label style={labelStyle}>Additional Notes</label>
                  <input type="text" placeholder="Any other considerations for your context" value={planValues.notes || ""} onChange={e => setPlanValues(prev => ({ ...prev, notes: e.target.value }))} onClick={e => e.stopPropagation()} style={inputStyle} />
                </div>

                {/* Section 4: Checklist */}
                <h3 style={{ fontSize: "15px", fontWeight: 700, color: "#0f172a", margin: "24px 0 12px 0" }}>4. Design Principles Checklist</h3>
                <p style={{ fontSize: "12px", color: "#64748b", margin: "0 0 12px 0" }}>Check each principle to confirm your Defend design meets the minimum conditions for genuine assurance.</p>
                <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                  {PRINCIPLE_CHECKLIST.map((c, i) => (
                    <label key={i} style={{ display: "flex", gap: "10px", alignItems: "flex-start", padding: "10px 14px", background: checklistValues[i] ? "#f0fdf4" : "#f8fafc", border: "1px solid " + (checklistValues[i] ? "#bbf7d0" : "#e2e8f0"), borderRadius: "8px", cursor: "pointer" }}>
                      <input type="checkbox" checked={!!checklistValues[i]} onChange={e => { e.stopPropagation(); setChecklistValues(prev => ({ ...prev, [i]: !prev[i] })); }} style={{ marginTop: "2px", accentColor: "#16a34a" }} />
                      <div>
                        <span style={{ fontSize: "12px", fontWeight: 700, color: "#d97706" }}>{c.principle}: </span>
                        <span style={{ fontSize: "12px", color: "#475569" }}>{c.question}</span>
                      </div>
                    </label>
                  ))}
                </div>
              </div>

              <div style={{ display: "flex", gap: "10px", flexWrap: "wrap" }}>
                <button onClick={handlePrint} style={{ ...btnStyle, background: "#2d6a4f", color: "white" }}>Generate Implementation Brief</button>
                <button onClick={() => { setPlanValues({}); setChecklistValues({}); }} style={{ ...btnStyle, background: "#f1f5f9", color: "#475569" }}>Clear Template</button>
              </div>

              <div style={{ marginTop: "24px", background: "#e8f5ee", border: "1px solid #b7d9c4", borderRadius: "10px", padding: "16px 18px" }}>
                <h4 style={{ fontSize: "13px", fontWeight: 700, color: "#1a3a2a", margin: "0 0 6px 0" }}>Further Reading</h4>
                <p style={{ fontSize: "12px", color: "#2d6a4f", lineHeight: 1.55, margin: 0 }}>
                  For a comprehensive implementation guide including worked examples, rubric templates, and step-by-step instructions for each SAGE step, see: Elkhodr, M. & Gide, E. (2026). <em>Embedding Generative AI in Curriculum: The SAGE Framework and Evidence-Based Implementation Guide</em>. Zenodo. DOI: 10.5281/zenodo.18295619
                </p>
              </div>
            </div>
          )}
